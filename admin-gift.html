<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>禮品領取管理 - 捐血報到系統</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.6);
      color: #fff;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="admin-header-bar">
      <h1 style="font-size:1.1rem; font-weight:700; letter-spacing:0.05em;">🩸 捐血報到系統</h1>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
    <div class="subtitle">資料管理</div>
  </header>

  <main class="container">

    <!-- 搜尋卡片 -->
    <div class="card" id="searchCard">
      <div class="card-title">
        <span>🔍</span> 查詢民眾資料
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabPhone" onclick="switchTab('phone')">手機電話</button>
        <button class="tab-btn"        id="tabNumber" onclick="switchTab('number')">報到編號</button>
      </div>

      <div class="tab-panel active" id="panelPhone">
        <form id="phoneForm" novalidate>
          <div class="form-group">
            <label for="s-phone">手機號碼 <span class="required">*</span></label>
            <input type="tel" id="s-phone" class="form-control"
                   placeholder="例：0912345678" maxlength="10"
                   inputmode="numeric"
                   oninput="this.value=this.value.replace(/\D/g,'')">
            <div class="error-msg" id="err-s-phone">請輸入 10 碼手機號碼（09xxxxxxxx）</div>
          </div>
          <button type="submit" class="btn btn-primary">查詢</button>
        </form>
      </div>

      <div class="tab-panel" id="panelNumber">
        <form id="numberForm" novalidate>
          <div class="form-group">
            <label for="s-number">報到編號 <span class="required">*</span></label>
            <input type="text" id="s-number" class="form-control"
                   placeholder="例：0001" maxlength="4"
                   inputmode="numeric"
                   oninput="this.value=this.value.replace(/\D/g,'')">
            <div class="error-msg" id="err-s-number">請輸入報到編號</div>
          </div>
          <button type="submit" class="btn btn-primary">查詢</button>
        </form>
      </div>

      <div id="searchLoading" class="loading" style="display:none; margin-top:12px;">
        <div class="spinner"></div>
        <span>查詢中，請稍候...</span>
      </div>

      <div id="searchError" class="result-box" style="margin-top:12px;"></div>
    </div>

    <!-- 查詢結果 + 編輯卡片 -->
    <div class="card" id="resultCard" style="display:none;">

      <div class="card-title">
        <span>✏️</span> 查詢結果 / 編輯資料
      </div>

      <p style="font-size:0.88rem; color:#1565C0; background:#E3F2FD; padding:10px 12px; border-radius:8px; margin-bottom:18px;">
        電話號碼不可修改，其餘欄位均可更新。
      </p>

      <form id="editForm" novalidate>

        <div class="form-group">
          <label>報名時間</label>
          <input type="text" id="f-regtime" class="form-control" placeholder="yyyy/mm/dd">
        </div>

        <div class="form-group">
          <label for="f-company">公司行號</label>
          <select id="f-company" class="form-control" onchange="toggleFCompanyOther()">
            <option value="">請選擇</option>
            <option value="仕興員工／仕興員工親友">仕興員工／仕興員工親友</option>
            <option value="董事長親友/獅子會">董事長親友/獅子會</option>
            <option value="總經理(青商會/台灣應達)">總經理(青商會/台灣應達)</option>
            <option value="銀行">銀行</option>
            <option value="貿易商/報關行總務/教友">貿易商/報關行總務/教友</option>
            <option value="供應廠商">供應廠商</option>
            <option value="週邊學校警義消">週邊學校警義消</option>
            <option value="CCK聯誼廠商">CCK聯誼廠商</option>
            <option value="其他">其他</option>
          </select>
          <input type="text" id="f-company-other" class="form-control"
                 placeholder="請說明來源" maxlength="50"
                 style="display:none; margin-top:8px;">
        </div>

        <div class="form-group">
          <label for="f-name">姓名</label>
          <input type="text" id="f-name" class="form-control" maxlength="20">
        </div>

        <div class="form-group">
          <label>電話</label>
          <input type="tel" id="f-phone" class="form-control" readonly
                 style="background:#F5F5F5; color:#757575;">
        </div>

        <div class="form-group">
          <label for="f-cc">捐血CC數</label>
          <select id="f-cc" class="form-control">
            <option value="">請選擇</option>
            <option value="250cc">250cc</option>
            <option value="500cc">500cc</option>
          </select>
        </div>

        <div class="form-group">
          <label>報到時間</label>
          <input type="text" id="f-checkintime" class="form-control" placeholder="yyyy/mm/dd">
        </div>

        <div class="form-group">
          <label for="f-checkinnum">報到編號</label>
          <input type="text" id="f-checkinnum" class="form-control"
                 maxlength="4" inputmode="numeric"
                 oninput="this.value=this.value.replace(/\D/g,'')">
        </div>

        <div class="form-group">
          <label for="f-checkin">報到</label>
          <select id="f-checkin" class="form-control">
            <option value="">—（未報到）</option>
            <option value="Y">Y（已報到）</option>
          </select>
        </div>

        <div class="form-group">
          <label for="f-donated">捐血成功</label>
          <select id="f-donated" class="form-control">
            <option value="">—（未填寫）</option>
            <option value="Y">Y（成功）</option>
            <option value="N">N（未成功）</option>
          </select>
        </div>

        <div class="form-group">
          <label for="f-gift">禮品領取</label>
          <select id="f-gift" class="form-control">
            <option value="">—（未填寫）</option>
            <option value="Y">Y（已領取）</option>
            <option value="N">N（之後補發）</option>
            <option value="無符合資格">無符合資格</option>
          </select>
        </div>

        <div id="submitLoading" class="loading" style="display:none;">
          <div class="spinner"></div>
          <span>更新中，請稍候...</span>
        </div>

        <div id="submitResult" class="result-box"></div>

        <button type="submit" class="btn btn-primary" id="confirmBtn" style="margin-top:8px;">
          確認更新
        </button>

        <button type="button" class="btn btn-outline" onclick="backToSearch()">
          返回查詢
        </button>

      </form>

    </div>

  </main>

  <script src="js/config.js"></script>
  <script>
    const token = sessionStorage.getItem('ADMIN_TOKEN');
    if (!token) {
      window.location.replace('admin-login.html');
    }

    const KNOWN_COMPANIES = [
      '仕興員工／仕興員工親友', '董事長親友/獅子會', '總經理(青商會/台灣應達)',
      '銀行', '貿易商/報關行總務/教友', '供應廠商', '週邊學校警義消',
      'CCK聯誼廠商', '其他'
    ];

    let currentPhone = null; // 以電話作為更新時的定位鍵

    // ── 登出 ──
    function logout() {
      sessionStorage.removeItem('ADMIN_TOKEN');
      window.location.replace('admin-login.html');
    }

    // ── Tab 切換 ──
    function switchTab(tab) {
      document.getElementById('tabPhone').classList.toggle('active',  tab === 'phone');
      document.getElementById('tabNumber').classList.toggle('active', tab === 'number');
      document.getElementById('panelPhone').classList.toggle('active',  tab === 'phone');
      document.getElementById('panelNumber').classList.toggle('active', tab === 'number');
      clearSearchError();
    }

    function clearSearchError() {
      const box = document.getElementById('searchError');
      box.className = 'result-box';
      box.innerHTML  = '';
    }

    // ── 手機電話查詢 ──
    document.getElementById('phoneForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const phone = document.getElementById('s-phone').value.trim();
      const errEl = document.getElementById('err-s-phone');
      if (!/^09\d{8}$/.test(phone)) { errEl.classList.add('show'); return; }
      errEl.classList.remove('show');
      await doLookup({ action: 'admin_lookup', token: token, 電話: phone });
    });

    // ── 報到編號查詢 ──
    document.getElementById('numberForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const num   = document.getElementById('s-number').value.trim();
      const errEl = document.getElementById('err-s-number');
      if (!num) { errEl.classList.add('show'); return; }
      errEl.classList.remove('show');
      await doLookup({ action: 'admin_lookup', token: token, 報到編號: num });
    });

    // ── 共用查詢邏輯 ──
    async function doLookup(payload) {
      clearSearchError();
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('searchLoading').style.display = 'flex';

      try {
        const res  = await fetch(CONFIG.GAS_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (data.status === 'unauthorized') {
          sessionStorage.removeItem('ADMIN_TOKEN');
          window.location.replace('admin-login.html');
          return;
        }

        if (data.status === 'success') {
          showResult(data);
        } else {
          const box = document.getElementById('searchError');
          box.className = 'result-box error';
          box.innerHTML = `<div class="result-title">❌ 查無資料</div><div class="result-detail">${data.message}</div>`;
        }
      } catch (err) {
        const box = document.getElementById('searchError');
        box.className = 'result-box error';
        box.innerHTML = '<div class="result-title">❌ 連線錯誤</div><div class="result-detail">請確認網路後再試。</div>';
      } finally {
        document.getElementById('searchLoading').style.display = 'none';
      }
    }

    // ── 顯示查詢結果（預填表單） ──
    function showResult(data) {
      currentPhone = data.電話 || '';

      document.getElementById('submitResult').className = 'result-box';
      document.getElementById('submitResult').innerHTML  = '';
      document.getElementById('confirmBtn').disabled = false;

      document.getElementById('f-regtime').value     = formatDateStr(data.報名時間);
      document.getElementById('f-name').value         = data.姓名     || '';
      document.getElementById('f-phone').value        = data.電話     || '';
      document.getElementById('f-cc').value           = data.捐血CC數 || '';
      document.getElementById('f-checkintime').value  = formatDateStr(data.報到時間);
      document.getElementById('f-checkinnum').value   = data.報到編號 ? String(data.報到編號).padStart(4, '0') : '';
      document.getElementById('f-checkin').value      = data.報到     || '';
      document.getElementById('f-donated').value      = data.捐血成功 || '';
      document.getElementById('f-gift').value         = data.禮品領取 || '';

      // 公司行號（含「其他」判斷）
      const companyVal = data.公司行號 || '';
      const sel = document.getElementById('f-company');
      if (KNOWN_COMPANIES.includes(companyVal)) {
        sel.value = companyVal;
        document.getElementById('f-company-other').style.display = 'none';
      } else if (companyVal) {
        sel.value = '其他';
        document.getElementById('f-company-other').style.display = 'block';
        document.getElementById('f-company-other').value = companyVal;
      } else {
        sel.value = '';
        document.getElementById('f-company-other').style.display = 'none';
      }

      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── 公司行號「其他」切換 ──
    function toggleFCompanyOther() {
      const isOther = document.getElementById('f-company').value === '其他';
      document.getElementById('f-company-other').style.display = isOther ? 'block' : 'none';
    }

    function getFCompanyValue() {
      const sel = document.getElementById('f-company').value;
      return sel === '其他' ? document.getElementById('f-company-other').value.trim() : sel;
    }

    // ── 確認更新 ──
    document.getElementById('editForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      document.getElementById('submitLoading').style.display = 'flex';
      document.getElementById('submitResult').className = 'result-box';
      document.getElementById('submitResult').innerHTML  = '';

      const checkinNum = document.getElementById('f-checkinnum').value.trim();

      try {
        const res  = await fetch(CONFIG.GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            action:   'admin_update',
            token:    token,
            _phone:   currentPhone,
            報名時間: document.getElementById('f-regtime').value.trim(),
            公司行號: getFCompanyValue(),
            姓名:     document.getElementById('f-name').value.trim(),
            捐血CC數: document.getElementById('f-cc').value,
            報到時間: document.getElementById('f-checkintime').value.trim(),
            報到編號: checkinNum,
            報到:     document.getElementById('f-checkin').value,
            捐血成功: document.getElementById('f-donated').value,
            禮品領取: document.getElementById('f-gift').value,
          }),
        });
        const data = await res.json();

        if (data.status === 'unauthorized') {
          sessionStorage.removeItem('ADMIN_TOKEN');
          window.location.replace('admin-login.html');
          return;
        }

        const box = document.getElementById('submitResult');
        if (data.status === 'success') {
          box.className = 'result-box success';
          box.innerHTML = '<div class="result-title">✅ 更新成功</div><div class="result-detail">資料已更新至 Google Sheet。</div>';
        } else {
          box.className = 'result-box error';
          box.innerHTML = `<div class="result-title">❌ 更新失敗</div><div class="result-detail">${data.message}</div>`;
          btn.disabled = false;
        }
      } catch (err) {
        const box = document.getElementById('submitResult');
        box.className = 'result-box error';
        box.innerHTML = '<div class="result-title">❌ 連線錯誤</div><div class="result-detail">請確認網路後再試。</div>';
        btn.disabled = false;
      } finally {
        document.getElementById('submitLoading').style.display = 'none';
      }
    });

    // ── 返回查詢 ──
    function backToSearch() {
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('s-phone').value  = '';
      document.getElementById('s-number').value = '';
      clearSearchError();
      currentPhone = null;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 日期格式化（Date 物件或 ISO 字串 → yyyy/mm/dd） ──
    function formatDateStr(val) {
      if (!val) return '';
      const d = new Date(val);
      if (isNaN(d.getTime())) return String(val);
      const yyyy = d.getFullYear();
      const mm   = String(d.getMonth() + 1).padStart(2, '0');
      const dd   = String(d.getDate()).padStart(2, '0');
      return `${yyyy}/${mm}/${dd}`;
    }
  </script>
</body>
</html>
